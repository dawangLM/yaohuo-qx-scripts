[rewrite_local]
# Inject the AVJB Artplayer replacement into AVJB HTML pages.
^https?:\/\/(?:www\.)?avjb\.cc\/.* url script-response-body https://raw.githubusercontent.com/dawangLM/yaohuo-qx-scripts/main/avjb_artplayer_qx.js?v=20260608-5

# Let the injected browser player and downloader read AVStatic segment responses.
^https?:\/\/(?:list|stat)\.avstatic\.com\/.* url script-response-header https://raw.githubusercontent.com/dawangLM/yaohuo-qx-scripts/main/avjb_cors_headers_qx.js?v=20260608-5

[mitm]
hostname = avjb.cc, www.avjb.cc, list.avstatic.com, stat.avstatic.com
