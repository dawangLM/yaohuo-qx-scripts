[rewrite_local]
# Inject the AVJB Artplayer replacement into AVJB HTML pages.
^https?:\/\/(?:www\.)?avjb\.cc\/.* url script-response-body https://raw.githubusercontent.com/dawangLM/yaohuo-qx-scripts/main/avjb_artplayer_qx.js?v=20260608-8

# Make AVStatic m3u8/segment requests look like the native embed player.
^https?:\/\/(?:list|stat)\.avstatic\.com\/.* url script-request-header https://raw.githubusercontent.com/dawangLM/yaohuo-qx-scripts/main/avjb_avstatic_request_headers_qx.js?v=20260608-8

# Let the injected browser player and downloader read AVStatic m3u8/segment responses.
^https?:\/\/(?:list|stat)\.avstatic\.com\/.* url script-response-header https://raw.githubusercontent.com/dawangLM/yaohuo-qx-scripts/main/avjb_cors_headers_qx.js?v=20260608-8

[mitm]
hostname = avjb.cc, www.avjb.cc, list.avstatic.com, stat.avstatic.com
